{% extends "base.html" %}

{% block title %}ログイン — taskAPP{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
  <div class="w-full max-w-md">

    <!-- カードヘッダー -->
    <div class="text-center mb-8">
      <span class="text-5xl">📋</span>
      <h1 class="text-2xl font-bold text-gray-800 mt-3">taskAPP にログイン</h1>
      <p class="text-sm text-gray-500 mt-1">サブスクと定期タスクを一元管理</p>
    </div>

    <!-- フォームカード -->
    <div class="bg-white rounded-2xl shadow-md border border-gray-100 px-8 py-8">

      {% if form.errors %}
      <div class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3 mb-6">
        ユーザー名またはパスワードが正しくありません。
      </div>
      {% endif %}

      <form method="POST" novalidate>
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}" />

        <!-- ユーザー名 -->
        <div class="mb-5">
          <label for="id_username" class="block text-sm font-medium text-gray-700 mb-1">
            ユーザー名
          </label>
          <input
            type="text"
            id="id_username"
            name="username"
            autofocus
            autocomplete="username"
            required
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition"
            placeholder="ユーザー名を入力"
          />
        </div>

        <!-- パスワード -->
        <div class="mb-6">
          <label for="id_password" class="block text-sm font-medium text-gray-700 mb-1">
            パスワード
          </label>
          <input
            type="password"
            id="id_password"
            name="password"
            autocomplete="current-password"
            required
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition"
            placeholder="パスワードを入力"
          />
        </div>

        <!-- ログインボタン -->
        <button
          type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white font-semibold py-2.5 rounded-lg transition-colors text-sm shadow-sm"
        >
          ログイン
        </button>
      </form>

      <!-- サインアップリンク -->
      <p class="text-center text-sm text-gray-500 mt-6">
        アカウントをお持ちでない方は
        <a href="{% url 'accounts:signup' %}" class="text-indigo-600 hover:text-indigo-800 font-medium">
          新規登録
        </a>
      </p>
    </div>

  </div>
</div>
{% endblock %}
