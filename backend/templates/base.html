<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}taskAPP{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- Header -->
  <header class="bg-indigo-700 text-white shadow-md">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2 text-xl font-bold tracking-wide hover:opacity-90">
        <span class="text-2xl">📋</span> taskAPP
      </a>
      <nav class="flex items-center gap-4 text-sm font-medium">
        {% if user.is_authenticated %}
          <a href="/" class="hover:text-indigo-200 transition-colors">ダッシュボード</a>
          {% if user.is_staff %}
          <a href="/admin/" class="hover:text-indigo-200 transition-colors">管理画面</a>
          {% endif %}
          <!-- ユーザー情報 + ログアウト -->
          <div class="flex items-center gap-3 ml-2 pl-4 border-l border-indigo-500">
            <span class="text-indigo-200 text-xs">👤 {{ user.username }}</span>
            <form method="POST" action="{% url 'accounts:logout' %}">
              {% csrf_token %}
              <button
                type="submit"
                class="bg-indigo-500 hover:bg-indigo-400 text-white text-xs font-semibold px-3 py-1.5 rounded-lg transition-colors"
              >
                ログアウト
              </button>
            </form>
          </div>
        {% else %}
          <a href="{% url 'accounts:login' %}" class="hover:text-indigo-200 transition-colors">ログイン</a>
          <a href="{% url 'accounts:signup' %}" class="bg-white text-indigo-700 hover:bg-indigo-50 font-semibold px-4 py-1.5 rounded-lg transition-colors text-xs">
            新規登録
          </a>
        {% endif %}
      </nav>
    </div>
  </header>

  <!-- Main -->
  <main class="max-w-5xl mx-auto px-6 py-8">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="border-t border-gray-200 mt-12 py-6 text-center text-xs text-gray-400">
    © 2026 taskAPP
  </footer>

</body>
</html>
