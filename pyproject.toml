[tool.black]
line-length = 88
target-version = ["py312"]
exclude = '''
/(
    \.venv
  | migrations
)/
'''

[tool.ruff]
line-length = 88
target-version = "py312"
exclude = [".venv", "migrations"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]
ignore = ["E501"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.local"
pythonpath = ["backend"]
testpaths = ["backend"]
